#
# aerc main configuration — managed by chezmoi
# Account definitions live in accounts.conf (generated from a template).
# Reference: man aerc-config
#

[general]
# accounts.conf may contain cred-commands but never plaintext passwords here.
unsafe-accounts-conf = false

[ui]
styleset-name = gruvbox
mouse-enabled = true
threading-enabled = true
sidebar-width = 22
empty-message = (no messages)
new-message-bell = true

# message list columns
index-columns = date<20,name<17,flags>4,subject<*
column-date = {{.DateAutoFormat .Date.Local}}
column-name = {{index (.From | names) 0}}
column-flags = {{.Flags | join ""}}
column-subject = {{.ThreadPrefix}}{{.Subject}}

# show a readable timestamp
timestamp-format = 2006-01-02 15:04
this-day-time-format = 15:04
this-year-time-format = 01-02 15:04

[viewer]
pager = less -Rc
alternatives = text/plain,text/html
header-layout = From|To,Cc|Bcc,Date,Subject

[compose]
# leave blank to use $EDITOR
editor =
header-layout = To|From,Subject
reply-to-self = false

[filters]
text/plain = colorize
text/calendar = calendar
message/delivery-status = colorize
message/rfc822 = colorize
text/html = html | colorize
application/x-sh = colorize
