# aerc keybindings — managed by chezmoi. Reference: man aerc-binds

# Global bindings: declared before the first [group] header, so they apply
# in every context. account/tab switching (Gmail <-> Outlook). [compose]
# sets $noinherit, so <tab> there stays field-navigation — no conflict.
<Tab> = :next-tab<Enter>
<backtab> = :prev-tab<Enter>

[messages]
q = :quit<Enter>

j = :next<Enter>
<Down> = :next<Enter>
k = :prev<Enter>
<Up> = :prev<Enter>
<C-d> = :next 50%<Enter>
<C-u> = :prev 50%<Enter>
g = :select 0<Enter>
G = :select -1<Enter>

J = :next-folder<Enter>
K = :prev-folder<Enter>
H = :collapse-folder<Enter>
L = :expand-folder<Enter>

v = :mark -t<Enter>
V = :mark -v<Enter>

<Enter> = :view<Enter>
d = :prompt 'Really delete this message?' 'delete-message'<Enter>
D = :delete<Enter>
A = :archive flat<Enter>

C = :compose<Enter>
rr = :reply -a<Enter>
rq = :reply -aq<Enter>
Rr = :reply<Enter>
Rq = :reply -q<Enter>
f = :forward<Enter>

c = :cf<space>
$ = :term<space>
! = :term<space>
| = :pipe<space>

/ = :search<space>
\ = :filter<space>
n = :next-result<Enter>
N = :prev-result<Enter>
<Esc> = :clear<Enter>

[view]
q = :close<Enter>
O = :open<Enter>
S = :save<space>
| = :pipe<space>
D = :delete<Enter>
A = :archive flat<Enter>

f = :forward<Enter>
rr = :reply -a<Enter>
rq = :reply -aq<Enter>
Rr = :reply<Enter>
Rq = :reply -q<Enter>

J = :next<Enter>
K = :prev<Enter>

[compose]
# pressing $complete will autocomplete an address
$noinherit = true
$complete = <C-o>
<C-k> = :prev-field<Enter>
<C-j> = :next-field<Enter>
<tab> = :next-field<Enter>
<backtab> = :prev-field<Enter>

[compose::editor]
$noinherit = true
$complete = <C-o>
<C-k> = :prev-field<Enter>
<C-j> = :next-field<Enter>

[compose::review]
y = :send<Enter>
n = :abort<Enter>
e = :edit<Enter>
a = :attach<space>

[terminal]
$noinherit = true
$complete = <C-x>
<C-p> = :prev-tab<Enter>
<C-n> = :next-tab<Enter>
