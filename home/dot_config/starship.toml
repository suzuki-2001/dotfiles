# starship prompt — managed by chezmoi.  Reference: https://starship.rs/config/
add_newline = true
command_timeout = 1000

[directory]
truncation_length = 4
truncate_to_repo = true

[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "

[conda]
# shown when a conda/mamba environment is active
format = "[$symbol$environment]($style) "
