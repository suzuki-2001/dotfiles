# ~/.tmux.conf — managed by chezmoi.
# Useful mainly for SSH work (HPCI): a session survives a dropped connection.
#   tmux            start / reattach
#   tmux ls         list sessions
#   C-a d           detach (session keeps running)

# --- general -------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # true-color passthrough
set -g mouse on
set -g history-limit 50000
set -sg escape-time 10
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- prefix: C-a (easier to reach than C-b) ------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- splits: | and -, opened in the current pane's directory -------------
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# --- vim-style pane navigation -------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- reload --------------------------------------------------------------
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# --- gruvbox status line -------------------------------------------------
set -g status-style "bg=#3c3836,fg=#ebdbb2"
set -g status-left "#[bg=#458588,fg=#1d2021,bold] #S #[default] "
set -g status-left-length 30
set -g status-right "#[fg=#a89984]%Y-%m-%d %H:%M "
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "bg=#fabd2f,fg=#1d2021,bold"
set -g pane-active-border-style "fg=#fabd2f"
set -g pane-border-style "fg=#504945"
